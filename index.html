<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Status Control</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#0f1117;
    font-family:Arial,sans-serif;
    color:white;
}

.container{
    width:420px;
    padding:40px;
    border-radius:30px;
    background:#181c25;
    box-shadow:
        0 0 40px rgba(0,0,0,0.5),
        inset 0 0 1px rgba(255,255,255,0.1);
    text-align:center;
}

.title{
    font-size:18px;
    opacity:.7;
    margin-bottom:20px;
    letter-spacing:2px;
}

.status-box{
    width:100%;
    padding:35px;
    border-radius:25px;
    font-size:60px;
    font-weight:bold;
    margin-bottom:30px;
    transition:.3s;
}

.on{
    background:#00c853;
    box-shadow:0 0 30px rgba(0,200,83,.5);
}

.off{
    background:#d50000;
    box-shadow:0 0 30px rgba(213,0,0,.5);
}

.buttons{
    display:flex;
    gap:15px;
    margin-bottom:25px;
}

button{
    flex:1;
    border:none;
    padding:16px;
    border-radius:15px;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    color:white;
    transition:.2s;
}

button:hover{
    transform:scale(1.03);
}

.on-btn{
    background:#00c853;
}

.off-btn{
    background:#d50000;
}

.info{
    font-size:14px;
    opacity:.7;
    line-height:1.8;
}

.code{
    color:#4fc3f7;
    font-family:monospace;
}
</style>

</head>
<body>

<div class="container">

    <div class="title">
        STATUS CONTROL PANEL
    </div>

    <div class="status-box
        {% if status == 'ON' %}
            on
        {% elif status == 'OFF' %}
            off
        {% endif %}
    ">
        {{ status }}
    </div>

    <div class="buttons">

        <button
            class="on-btn"
            onclick="window.location.href='/?status=on'">
            TURN ON
        </button>

        <button
            class="off-btn"
            onclick="window.location.href='/?status=off'">
            TURN OFF
        </button>

    </div>

    <div class="info">
        Управление через URL:
        <br><br>

        <span class="code">
            http://localhost:5000/?status=on
        </span>

        <br><br>

        <span class="code">
            http://localhost:5000/?status=off
        </span>
    </div>

</div>

</body>
</html>
